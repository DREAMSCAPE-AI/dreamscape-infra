---
# Step 1: bootstrap self-signed issuer
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}
---
# Step 2: root CA certificate (valid 10 years)
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dreamscape-root-ca
  namespace: infra
spec:
  isCA: true
  commonName: dreamscape-root-ca
  duration: 87600h   # 10 years
  secretName: dreamscape-root-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io
---
# Step 3: CA-based ClusterIssuer used by ingresses
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: dreamscape-ca-issuer
spec:
  ca:
    secretName: dreamscape-root-ca-secret
